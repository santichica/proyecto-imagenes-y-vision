project:
  name: "HAM10000 Synthetic Augmentation Research"
  seed: 42
  task: "Nevus vs Melanoma"

dataset:
  source: "Harvard Dataverse"
  name: "HAM10000"
  doi: "doi:10.7910/DVN/DBW86T"
  version: 4
  release_date: "2023-02-07"
  publication_date: "2018-06-04"
  source_url: "https://dataverse.harvard.edu/api/datasets/:persistentId/?persistentId=doi:10.7910/DVN/DBW86T"
  download_dir: "data/raw/ham10000"

paths:
  root: "/home/schica/proyecto-imagenes-y-vision"
  data_raw: "data/raw"
  data_processed: "data/processed"
  experiments: "experiments"
  reports: "reports"

split:
  train: 0.70
  val: 0.15
  test: 0.15
  target_classes: ["nv", "mel"]

modeling:
  image_size: 224
  batch_size: 32
  metrics:
    - recall
    - f1
    - auc

augmentation:
  enabled: true
  generator: "stable-diffusion"
  strategy: "textual-inversion"
